<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="admin-wrapper">

  <!-- Top Header -->
  <header class="admin-header">
    <div class="header-left">
      <a href="{{ url_for('admin_dashboard') }}" class="header-logo">Admin<span>.</span></a>
      <span class="page-title">{% block page_title %}Dashboard{% endblock %}</span>
    </div>
    <div class="header-right">
      <a href="{{ url_for('index') }}" target="_blank" class="btn-sm">🌐 View Site</a>
      <a href="{{ url_for('logout') }}" class="btn-sm btn-logout">🚪 Logout</a>
      <span class="admin-user">👤 {{ session.get('admin','Admin') }}</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="admin-content">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </div>
  </main>

</div>

<script>
document.querySelectorAll('.flash').forEach(el => {
  setTimeout(() => {
    el.style.transition = 'opacity 0.4s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 400);
  }, 3500);
});
</script>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
