<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="login-wrap">
  <div class="login-card glass">
    <div class="login-header">
      <div class="login-icon">🔑</div>
      <h1>Reset Password</h1>
      <p>Enter your secret key to reset your password</p>
    </div>

    {% if success %}
    <div class="alert alert-success" style="margin-bottom:1.5rem;">✓ {{ success }}</div>
    <div style="text-align:center;">
      <a href="{{ url_for('login') }}" class="btn-primary">Go to Login →</a>
    </div>
    {% else %}

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="login-form">
      <div class="form-group">
        <label>Secret Key</label>
        <input type="password" name="secret_key" placeholder="Enter your secret key" required autofocus>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn-primary" style="width:100%">Reset Password →</button>
    </form>
    {% endif %}

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="{{ url_for('login') }}" style="color:rgba(255,255,255,0.4);font-size:0.82rem;">← Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
